  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body class="cosmic-background">
  <header class="header">
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <canvas id="nebula"></canvas>
  <canvas id="starfield"></canvas>

  <main class="main-content contact-main">
    <section class="hero">
      <img src="/orion_logo.png" alt="Orion Rising Logo" class="logo" />
      <img src="/Tiberius_James.jpg" alt="Tiberius James Portrait" class="logo" />
    </section>

    <section class="contact-info">
      <h1>Contact Me</h1>
      <p><i class="fas fa-envelope"></i> <a href="mailto:Tiberius.James84@gmail.com">Tiberius.James84@gmail.com</a></p>
      <p><i class="fas fa-phone"></i> (515) 650-3131</p>
      <p>
        <a href="https://orionrising.dev/TJames.pdf" class="btn-glow" download>
          <i class="fas fa-download"></i> Download My Resume (PDF)
        </a>
      </p>
    </section>

    <section id="contactForm">
      <h2>Send Me a Message</h2>
      <small>I’ll get back to you as quickly as possible.</small>
      <form action="#" method="post">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <input type="text" name="subject" placeholder="Subject" required />
        <textarea name="message" placeholder="Comment"></textarea>
        <div class="form-buttons">
          <input class="formBtn" type="submit" value="Send" />
          <input class="formBtn" type="reset" value="Reset" />
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p class="forged">Forged by Order of the Dev ✨</p>
    <p>© 2025 Tiberius Orion James. All rights reserved.</p>
  </footer>

  <script src="starfield.js"></script>
  <script src="nebula.js"></script>
